name: mangochi_marketplace
description: "A comprehensive multi-vendor marketplace app for Mangochi, Malawi with e-commerce, real estate, and wallet features."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  #riverpod: ^3.3.2
  #flutter_riverpod: ^3.3.2
  #hooks_riverpod: ^3.3.2

  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0
  gal: ^2.3.0

  font_awesome_flutter: ^10.7.0
  marquee: ^2.3.0
  go_router: ^17.3.0

  device_info_plus: ^13.1.0


  


  audioplayers: ^6.0.0
  vibration: ^3.1.3
  vibration_platform_interface: ^0.1.0
  permission_handler: ^12.0.3


  path_provider: ^2.1.0
  share_plus: ^13.1.0


  carousel_slider: ^5.0.0

  table_calendar: ^3.1.2
  mobile_scanner: ^7.2.0


  # Local Storage & Security
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.2.0
  local_auth: ^3.0.1

  # Authentication & JWT
  jwt_decoder: ^2.0.1

  connectivity_plus: ^7.1.1

  # Maps & Location
  google_maps_flutter: ^2.5.0
  flutter_polyline_points: ^2.0.0
  geolocator: ^14.0.2
  flutter_tts: ^4.0.2

  # WebSocket
  web_socket_channel: ^3.0.3

  # UI & Widgets
  flutter_svg: ^2.0.5
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  pinput: ^6.0.2

  # Date & Time
  intl: ^0.20.2

  # Image Handling
  image_picker: ^1.1.2
  file_picker: ^12.0.0-beta.5
  image_cropper: ^12.2.1
 

  # Payment
  flutter_stripe: ^13.0.0

  # Notifications
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

  fluttertoast: ^9.1.0
  toastification: ^3.2.0

  # URL Launcher
  url_launcher: ^6.2.0

  # Logging
  logger: ^2.0.1


  flutter_map: ^8.3.0
  flutter_map_cancellable_tile_provider: ^3.1.1
  latlong2: ^0.9.1
  photo_view: ^0.15.0
  webview_flutter: ^4.10.0
  package_info_plus: ^10.1.0
  universal_html: ^2.3.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_icon.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true


  assets:
    - assets/images/logo.png
    - assets/images/logo2.png
    - assets/images/banner.png
    - assets/images/tnm.png
    - assets/images/airtel.png
    - assets/images/changu.png
    - assets/images/visa.png
    - assets/sounds/
