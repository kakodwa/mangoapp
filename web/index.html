<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <meta name="description" content="MalaTrade Marketplace - Everything Local. One Hub.">

  <!-- Mobile -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MalaTrade">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MalaTrade Marketplace</title>

  <link rel="manifest" href="manifest.json">

  <!-- Deep Link Routing -->
  <script>
    (function() {
      console.log('[WebRouting] Initializing client-side routing handler');

      const currentPath = window.location.pathname;
      const currentHash = window.location.hash;

      console.log('[WebRouting] Current path:', currentPath);
      console.log('[WebRouting] Current hash:', currentHash);

      if (
        currentPath &&
        currentPath !== '/' &&
        !currentPath.includes('flutter')
      ) {
        console.log('[WebRouting] Storing path:', currentPath);
        window.localStorage.setItem(
          'deferred_deep_link',
          currentPath
        );
      } else if (
        currentHash &&
        currentHash !== '#'
      ) {
        const hashPath = currentHash.replace('#', '');
        console.log('[WebRouting] Storing hash:', hashPath);
        window.localStorage.setItem(
          'deferred_deep_link',
          hashPath
        );
      }

      window.addEventListener('popstate', function(event){
        console.log('[WebRouting] Pop state:', event);

        const path = window.location.pathname;

        if (
          path &&
          path !== '/' &&
          !path.includes('flutter')
        ) {
          window.localStorage.setItem(
            'deferred_deep_link',
            path
          );
          window.location.reload();
        }
      });
    })();
  </script>
</head>

<body>
  <!-- Flutter App Bootstrap -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- PWA INSTALL HANDLER -->
  <script>
    let deferredPrompt = null;

    // Fired by browser when PWA criteria are met and installation is ready
    window.addEventListener('beforeinstallprompt', (event) => {
      console.log('[PWA] Install prompt available');
      event.preventDefault();
      deferredPrompt = event;

      // Dispatch custom event to notify Flutter's InstallAppButton
      window.dispatchEvent(new CustomEvent('pwaInstallAvailable'));
    });

    // Callable directly from Flutter JS interop
    window.installApp = async function() {
      console.log('[PWA] Install triggered from Flutter');

      if (!deferredPrompt) {
        console.log('[PWA] Deferred prompt unavailable');
        return;
      }

      deferredPrompt.prompt();

      const result = await deferredPrompt.userChoice;
      console.log('[PWA] User response choice:', result.outcome);

      deferredPrompt = null;

      // Notify Flutter to hide the button after prompt completion
      window.dispatchEvent(new CustomEvent('pwaInstalled'));
    };

    // Detect if app is already running/installed in standalone window
    window.addEventListener('appinstalled', () => {
      console.log('[PWA] Application installed successfully');
      deferredPrompt = null;
      window.dispatchEvent(new CustomEvent('pwaInstalled'));
    });
  </script>
</body>
</html>
